<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Orbital rings centered at 16,16 -->
  <g transform="translate(16,16)">
    <!-- Green ring -->
    <ellipse cx="0" cy="0" rx="11" ry="4" stroke="#6EE010" stroke-width="2.5" fill="none" transform="rotate(-35)"/>
    <!-- White ring -->
    <ellipse cx="0" cy="0" rx="11" ry="4" stroke="white" stroke-width="2" fill="none" transform="rotate(35)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#6EE010"/>
  </g>
</svg>
