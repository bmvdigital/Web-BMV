name: Build & Deploy to Hostgator

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Build estático
        run: npm run build

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Limpiar public_html
        run: |
          ssh -q -i ~/.ssh/deploy_key -p 22 \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "find ~/public_html -mindepth 1 -delete 2>/dev/null; true"

      - name: Deploy vía SCP
        run: |
          scp -q -r \
            -i ~/.ssh/deploy_key \
            -P 22 \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ./out/. \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/public_html/
